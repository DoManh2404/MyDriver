{% extends 'drive/base.html' %}

{% block title %}Sign in - Google Drive Clone{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <svg class="drive-svg-logo" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
                <path d="m6.6 74.4 13.9-24.2h53.4l-13.9 24.2z" fill="#0066da"/>
                <path d="m20.5 50.2-20.5-35.4 13.9-24.2 34.3 59.6z" fill="#00a85d"/>
                <path d="m60.1 50.2-13.8-24.1 20.6-35.5 20.4 35.4z" fill="#ffbc00"/>
            </svg>
            <h2 data-i18n="auth.drive_title">Google Drive</h2>
            <p data-i18n="auth.login_subtitle">Sign in to continue to Drive</p>
        </div>

        {% if error %}
        <div class="auth-error-banner">
            <span class="material-symbols-rounded">error</span>
            <p>{{ error }}</p>
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder=" " required autocomplete="username">
                <label for="username" data-i18n="auth.username">Username</label>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
                <label for="password" data-i18n="auth.password">Password</label>
            </div>

            <div class="auth-actions">
                <a href="{% url 'signup' %}" class="btn-link" data-i18n="auth.create_account">Create account</a>
                <button type="submit" class="btn btn-primary" data-i18n="auth.login_btn">Next</button>
            </div>
        </form>
    </div>
    <button type="button" class="lang-switch-chip" data-lang-toggle="true">EN / VI</button>
</div>
{% endblock %}
