{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Google Drive Clone{% endblock %}</title>
    <!-- Modern Typography: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Icons (Rounded) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <!-- App Custom styling -->
    <link rel="stylesheet" href="{% static 'drive/css/styles.css' %}">
    <script>
        (function () {
            const savedLang = localStorage.getItem('gdrive_lang') || 'en';
            document.documentElement.setAttribute('lang', savedLang);
        })();
    </script>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Global CSRF token configuration for JS Fetch requests -->
    <script>
        const CSRF_TOKEN = "{{ csrf_token }}";
    </script>
    <script src="{% static 'drive/js/i18n.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window.I18N && typeof window.I18N.applyTranslations === 'function') {
                window.I18N.applyTranslations();
            }
            document.querySelectorAll('[data-lang-toggle]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const nextLang = window.I18N.getCurrentLang() === 'en' ? 'vi' : 'en';
                    window.I18N.setLang(nextLang);
                    document.querySelectorAll('[data-lang-current]').forEach(function (node) {
                        node.textContent = nextLang.toUpperCase();
                    });
                });
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
